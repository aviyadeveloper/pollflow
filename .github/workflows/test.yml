name: Test Services

on:
  pull_request:
    branches:
      - main
    paths:
      - "services/**"
      - ".github/workflows/test.yml"

jobs:
  test-poll-generator:
    name: Test poll-generator (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/poll-generator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.11"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --ignore=tests/test_news_real.py --ignore=tests/test_llm_real.py --ignore=tests/test_e2e.py

  test-poll-broker:
    name: Test poll-broker (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/poll-broker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/poll-broker/go.sum

      - name: Run tests
        run: go test ./... -v

  test-frontend:
    name: Test frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

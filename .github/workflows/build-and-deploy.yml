name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - fix/ci-issues-after-service-migrations
    paths:
      - "services/**"
      - "k8s/apps/**"
      - ".github/workflows/build-and-deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3
  EKS_CLUSTER_NAME: pollflow-cluster

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service:
          - name: frontend
            context: ./services/frontend
            image: pollflow-frontend
          - name: poll-broker
            context: ./services/poll-broker
            image: pollflow-poll-broker

    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: image-tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service.image }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ${{ matrix.service.context }}
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "Pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update image tags in manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          # Update image tags in deployment manifests
          sed -i "s|image: .*pollflow-frontend.*|image: $ECR_REGISTRY/pollflow-frontend:$IMAGE_TAG|g" k8s/apps/frontend/deployment.yaml
          sed -i "s|image: .*pollflow-poll-broker.*|image: $ECR_REGISTRY/pollflow-poll-broker:$IMAGE_TAG|g" k8s/apps/poll-broker/deployment.yaml

      - name: Update secret names in ExternalSecret
        run: |
          # Load RDS config generated by Terraform
          source .ci/rds-config.env
          echo "RDS connection: $RDS_HOST:$RDS_PORT/$RDS_DBNAME"
          echo "RDS master secret ARN: $RDS_MASTER_SECRET_ARN"

          # Update ExternalSecret with RDS-managed secret ARN (External Secrets supports ARNs)
          sed -i "s|key: RDS_MASTER_SECRET_ARN_PLACEHOLDER|key: $RDS_MASTER_SECRET_ARN|g" k8s/secrets/external-secret-rds.yaml

          # Update ConfigMap with connection details
          sed -i "s|POSTGRES_HOST: RDS_HOST_PLACEHOLDER|POSTGRES_HOST: \"$RDS_HOST\"|g" k8s/secrets/rds-config.yaml
          sed -i "s|POSTGRES_PORT: RDS_PORT_PLACEHOLDER|POSTGRES_PORT: \"$RDS_PORT\"|g" k8s/secrets/rds-config.yaml
          sed -i "s|POSTGRES_DB: RDS_DBNAME_PLACEHOLDER|POSTGRES_DB: \"$RDS_DBNAME\"|g" k8s/secrets/rds-config.yaml

          echo ""
          echo "=== Checking ExternalSecret after replacement ==="
          grep "key:" k8s/secrets/external-secret-rds.yaml
          echo ""
          echo "=== Checking ConfigMap after replacement ==="
          grep "POSTGRES" k8s/secrets/rds-config.yaml

      - name: Deploy to EKS
        run: |
          echo "Applying Kubernetes manifests..."

          # Deploy storage class (required for Redis PVCs)
          kubectl apply -f k8s/storage/

          # Deploy secrets (External Secrets operator already deployed via Terraform)
          kubectl apply -f k8s/secrets/

          # Deploy Redis (if not already running)
          kubectl apply -f k8s/redis/

          # Wait for Redis to be ready
          echo "Waiting for Redis to be ready..."
          kubectl rollout status statefulset/redis-primary --timeout=5m || true
          kubectl rollout status statefulset/redis-replica --timeout=5m || true

          # Wait for External Secrets to populate
          echo "Waiting for secrets to be populated..."
          kubectl wait --for=condition=Ready externalsecret/rds-credentials --timeout=2m || true
          sleep 10

          # Deploy applications
          kubectl apply -f k8s/apps/frontend/
          kubectl apply -f k8s/apps/poll-broker/

          # Deploy ingress (creates ALB)
          kubectl apply -f k8s/ingress/

      - name: Debug pod status
        run: |
          echo "Checking pod status..."
          kubectl get pods -l 'app in (frontend,poll-broker)' -o wide

          echo ""
          echo "Checking events..."
          kubectl get events --sort-by='.lastTimestamp' | tail -20

          echo ""
          echo "Checking secret status..."
          kubectl get externalsecret rds-credentials
          kubectl get secret rds-credentials || echo "Secret not yet created"

          echo ""
          echo "=== ExternalSecret detailed status ==="
          kubectl describe externalsecret rds-credentials

          echo ""
          echo "=== ConfigMap status ==="
          kubectl get configmap rds-config || echo "ConfigMap not found"
          kubectl describe configmap rds-config || echo "ConfigMap not found"
      - name: Show deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: ${{ env.EKS_CLUSTER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ needs.build.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployments" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -l 'app in (frontend,poll-broker)' >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY

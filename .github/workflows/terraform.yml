name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**/*.tf"
      - "infra/**/*.tfvars"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3

      - name: Format Check
        run: |
          echo "Checking tf-bootstrap..."
          terraform -chdir=infra/tf-bootstrap fmt -check -recursive
          echo "Checking tf-main..."
          terraform -chdir=infra/tf-main fmt -check -recursive

      - name: Validate tf-bootstrap
        run: |
          terraform -chdir=infra/tf-bootstrap init -backend=false
          terraform -chdir=infra/tf-bootstrap validate

      - name: Validate tf-main
        run: |
          terraform -chdir=infra/tf-main init -backend=false
          terraform -chdir=infra/tf-main validate

  # Always-pass job that other required checks can depend on
  terraform-gate:
    name: Terraform Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [terraform-checks]
    steps:
      - name: Check Terraform Status
        run: |
          if [[ "${{ needs.terraform-checks.result }}" == "success" ]] || [[ "${{ needs.terraform-checks.result }}" == "skipped" ]]; then
            echo "Terraform checks passed or skipped"
            exit 0
          else
            echo "Terraform checks failed"
            exit 1
          fi
          terraform -chdir=infra/tf-main init -backend=false
          terraform -chdir=infra/tf-main validate

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pollflow-postgres
    env_file:
      - .development.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pollflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  poll-broker:
    build:
      context: ./services/poll-broker
      dockerfile: Dockerfile
    container_name: pollflow-poll-broker
    env_file:
      - .development.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        - POSTGRES_HOST=postgres
        - POSTGRES_PORT=5432
        - POSTGRES_DB=pollflow_development
        - POSTGRES_USER=pollflow_developer
        - POSTGRES_PASSWORD=developer_password
        - REDIS_HOST=redis
        - REDIS_PORT=6379
        - REDIS_PASSWORD=
    container_name: pollflow-frontend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pollflow_development
      - POSTGRES_USER=pollflow_developer
      - POSTGRES_PASSWORD=developer_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

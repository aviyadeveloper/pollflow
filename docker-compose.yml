version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pollflow-postgres
    env_file:
      - .development.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pollflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  poll-broker:
    build:
      context: ./services/poll-broker
      dockerfile: Dockerfile
    container_name: pollflow-poll-broker
    env_file:
      - .development.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

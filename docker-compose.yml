version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pollflow-postgres
    env_file:
      - .development.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

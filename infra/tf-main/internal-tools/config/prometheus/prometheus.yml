global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'pollflow'
    environment: 'production'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'internal-tools-host'


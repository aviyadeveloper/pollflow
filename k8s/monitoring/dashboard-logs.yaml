apiVersion: v1
kind: ConfigMap
metadata:
  name: pollflow-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "PollFlow"
data:
  pollflow-logs.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "type": "timeseries",
          "id": 1,
          "title": "Log Rate by Service",
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "loki", "uid": "loki"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2, "fillOpacity": 15}}, "overrides": []},
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [{"datasource": {"type": "loki", "uid": "loki"}, "expr": "sum by (app) (rate({namespace=\"default\", app=~\"poll-broker|frontend\"}[5m]))", "legendFormat": "{{app}}", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "id": 2,
          "title": "Error Log Rate",
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "loki", "uid": "loki"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2, "fillOpacity": 15}}, "overrides": []},
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi"}},
          "targets": [{"datasource": {"type": "loki", "uid": "loki"}, "expr": "sum by (app) (rate({namespace=\"default\", app=~\"poll-broker|frontend\"} |~ \"(?i)error|fatal|panic\" [5m]))", "legendFormat": "{{app}} errors", "refId": "A"}]
        },
        {
          "type": "logs",
          "id": 3,
          "title": "Poll Broker Logs",
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 6},
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {"dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true, "showCommonLabels": false, "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": false},
          "targets": [{"datasource": {"type": "loki", "uid": "loki"}, "expr": "{app=\"poll-broker\", namespace=\"default\"}", "refId": "A"}]
        },
        {
          "type": "logs",
          "id": 4,
          "title": "Frontend Logs",
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 18},
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {"dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true, "showCommonLabels": false, "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": false},
          "targets": [{"datasource": {"type": "loki", "uid": "loki"}, "expr": "{app=\"frontend\", namespace=\"default\"}", "refId": "A"}]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["pollflow", "logs"],
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "PollFlow Logs",
      "uid": "pollflow-logs",
      "version": 1
    }

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rds-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
    creationPolicy: Owner
  data:
    # Use RDS-managed secret for credentials (AWS manages password rotation)
    - secretKey: username
      remoteRef:
        key: rds!db-f408b8f2-331b-4d76-a578-0f3e928e9d30
        property: username
    - secretKey: password
      remoteRef:
        key: rds!db-f408b8f2-331b-4d76-a578-0f3e928e9d30
        property: password
    # Use Terraform-created secret for connection details
    - secretKey: host
      remoteRef:
        key: pollflow-rds-20260511094620589700000002
        property: host
    - secretKey: port
      remoteRef:
        key: pollflow-rds-20260511094620589700000002
        property: port
    - secretKey: dbname
      remoteRef:
        key: pollflow-rds-20260511094620589700000002
        property: dbname

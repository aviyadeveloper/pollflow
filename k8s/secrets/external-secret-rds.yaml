apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rds-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
    creationPolicy: Owner
  data:
    # RDS-managed secret (automatically rotates every 7 days)
    # Secret name is injected by CI/CD from Terraform outputs
    - secretKey: username
      remoteRef:
        key: RDS_MASTER_SECRET_PLACEHOLDER
        property: username
    - secretKey: password
      remoteRef:
        key: RDS_MASTER_SECRET_PLACEHOLDER
        property: password

apiVersion: apps/v1
kind: Deployment
metadata:
  name: poll-broker
  labels:
    app: poll-broker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: poll-broker
  template:
    metadata:
      labels:
        app: poll-broker
    spec:
      containers:
        - name: poll-broker
          image: 058264398399.dkr.ecr.eu-west-3.amazonaws.com/pollflow-poll-broker:latest
          env:
            # Environment
            - name: APP_ENV
              value: "production"
            # Observability
            - name: LOKI_URL
              value: "http://loki.pollflow.internal:3100"
            - name: LOG_LEVEL
              value: "info"
            - name: METRICS_PORT
              value: "9090"
            # RDS connection info (from ConfigMap)
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: POSTGRES_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: POSTGRES_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: POSTGRES_DB
            # RDS credentials (from Secret - auto-rotates)
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: password
            - name: REDIS_HOST
              value: "redis-primary"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
